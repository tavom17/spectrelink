services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - app

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    volumes:
      - ./api-gateway/src:/app/src
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://dev:dev@postgres-dev:5432/spectre_dev
      REDIS_URL: redis://redis-dev:6379
    networks:
      - app
      - data

  wallet-app:
    build:
      context: ./wallet-app
      dockerfile: Dockerfile
    volumes:
      - ./wallet-app/src:/app/src
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgres://dev:dev@postgres-dev:5432/spectre_dev
      REDIS_URL: redis://redis-dev:6379
    networks:
      - app
      - data

  coin-launcher:
    build:
      context: ./coin-launcher
      dockerfile: Dockerfile
    volumes:
      - ./coin-launcher/src:/app/src
    ports:
      - "3002:3002"
    environment:
      WALLET_APP_URL: http://wallet-app:3003
    networks:
      - app

  postgres-dev:
    image: postgres:16-alpine
    container_name: spectre-postgres-dev
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: spectre_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - data

  redis-dev:
    image: redis:7-alpine
    container_name: spectre-redis-dev
    ports:
      - "6379:6379"
    networks:
      - data

volumes:
  postgres-dev-data:

networks:
  app: {}
  data: {}
